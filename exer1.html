<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exer 1</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('btn_calcular');
            botao.addEventListener('click', calculo);
        }

        function calculo() {
            let saida = document.getElementById('resultado');
            saida.innerHTML = raioantes(4);
        }

        function raioantes(raio) {
            let area = raio * raio * Math.PI;
            return area;
        }
    </script>
</head>

<body>
    <h1>Aperte o botão</h1>
    <p id="resultado">Resultado...</p>
    <button id="btn_calcular">Calcular</button>
</body>

</html>
